{% extends "base.html" %}

{% block content %}
  <section class="form-shell auth-shell">
    <div>
      <p class="eyebrow">Password reset</p>
      <h2>{{ page_title }}</h2>
      <p class="form-help">Choose a new password for your account.</p>
    </div>

    {% if error_message %}
      <p class="error-banner">{{ error_message }}</p>
    {% endif %}

    <form class="item-form" method="post" action="/password-reset">
      <input type="hidden" name="token" value="{{ token }}" />
      <label>
        <span>New password</span>
        <input name="password" type="password" autocomplete="new-password" minlength="8" required />
      </label>
      <label>
        <span>Confirm password</span>
        <input name="confirm_password" type="password" autocomplete="new-password" minlength="8" required />
      </label>
      <div class="card-actions">
        <button class="button" type="submit">Update password</button>
        <a class="button button-secondary" href="/login">Back to login</a>
      </div>
    </form>
  </section>
{% endblock %}
