services:
  db:
    image: postgres:17-alpine
    container_name: household-inventory-db
    environment:
      POSTGRES_DB: household_inventory
      POSTGRES_USER: household_inventory
      POSTGRES_PASSWORD: household_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U household_inventory -d household_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
